<svg width="320" height="48" viewBox="0 0 320 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;family=Playfair+Display:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- SW boxed monogram -->
  <rect x="0" y="8" width="40" height="30" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="20" y="29" font-family="'DM Serif Display', Georgia, serif" font-size="16" font-weight="400" fill="#1a1a1a" text-anchor="middle">SW</text>

  <!-- Yellow highlight under WATCH -->
  <rect x="168" y="29" width="108" height="10" fill="#f5d038" opacity="0.6" rx="2"/>

  <!-- SCHOOLWATCH wordmark -->
  <text x="56" y="33" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="800" fill="#1a1a1a" letter-spacing="-0.02em">SCHOOLWATCH</text>
</svg>
